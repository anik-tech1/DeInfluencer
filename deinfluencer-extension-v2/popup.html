<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DeInfluencer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #0a0a0f;
      color: #e2e2ef;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
    }

    .header {
      padding: 16px;
      background: #0d0d17;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 11px;
      color: #4b5563;
      margin-top: 1px;
    }

    .body { padding: 16px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #0d0d17;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #22c55e; }
    .dot-red { background: #ef4444; }
    .dot-yellow { background: #f59e0b; }

    .status-text {
      font-size: 12px;
      color: #9ca3af;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s;
      border: none;
      margin-bottom: 8px;
    }

    .btn:last-child { margin-bottom: 0; }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.85; }

    .btn-ghost {
      background: #1e1e2e;
      border: 1px solid #2e2e42;
      color: #9ca3af;
    }

    .btn-ghost:hover { background: #2e2e42; color: #e2e2ef; }

    .divider {
      height: 1px;
      background: #1e1e2e;
      margin: 12px 0;
    }

    .info-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .info-list li {
      font-size: 11px;
      color: #6b7280;
      display: flex;
      align-items: flex-start;
      gap: 6px;
      line-height: 1.4;
    }

    .info-list li span { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:22px">🛡</span>
    <div>
      <div class="logo-text">DeInfluencer</div>
      <div class="logo-sub">AI Truth Machine</div>
    </div>
  </div>

  <div class="body">
    <div id="status-row" class="status-row">
      <div class="dot dot-yellow" id="status-dot"></div>
      <div class="status-text" id="status-text">Checking configuration…</div>
    </div>

    <button class="btn btn-primary" id="btn-yt">Open YouTube Shorts</button>
    <button class="btn btn-ghost" id="btn-options">⚙ Configure API Keys</button>

    <div class="divider"></div>

    <ul class="info-list">
      <li><span>🔍</span> Auto-analyzes when you open a YouTube Short</li>
      <li><span>🛡</span> Trust scores, product claims &amp; manipulation tactics</li>
      <li><span>⚡</span> Powered by YouTube API v3 + Gemini AI</li>
    </ul>
  </div>

  <script src="popup.js"></script>
</body>
</html>
